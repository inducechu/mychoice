syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.induce.userservice.grpc";
option java_outer_classname = "UserProto";

package user;

service UserService {
  rpc SyncUser (SyncUserRequest) returns (SyncUserResponse);
}

message SyncUserRequest {
  string external_id = 1;
  string email = 2;
  string role = 3;

  string first_name = 4;
  string last_name = 5;
  int32 age = 6;
  string city = 7;
}

message SyncUserResponse {
  int64 internal_id = 1;
  bool success = 2;
  string message = 3;
}