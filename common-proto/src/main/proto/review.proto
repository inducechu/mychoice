syntax = "proto3";

package review;

option java_package = "com.induce.reviewservice.grpc";
option java_multiple_files = true;

service ReviewInternalService {
  rpc GetUpdatedRatings(Empty) returns (RatingList);

  rpc CheckEnrollment(EnrollmentRequest) returns (EnrollmentResponse);
}

message Empty {}

message RatingEntry {
  int64 program_id = 1;
  double bayesian_rating = 2;
}

message RatingList {
  repeated RatingEntry ratings = 1;
}

message EnrollmentRequest {
  int64 user_id = 1;
  int64 program_id = 2;
}

message EnrollmentResponse {
  bool can_review = 1;
}
