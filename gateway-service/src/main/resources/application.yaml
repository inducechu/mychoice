server:
  port: 8080
spring:
  application:
    name: gateway-service
  config:
    import:
      - "optional:classpath:open-endpoints.yaml"
      - "optional:classpath:routes.yaml"
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: Auth Service
        url: /api/auth/v3/api-docs
        displayName: Сервис Авторизации
  api-docs:
    path: /v3/api-docs
management:
  endpoints:
    web:
      exposure:
        include: "gateway,health,info"
  endpoint:
    gateway:
      enabled: true
jwt:
  secret: "9a4f4c35456584c35063138072105151241121112413151235346314151617181920"
